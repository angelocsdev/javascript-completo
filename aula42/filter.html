<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div id="caixaNovoFuncionalidades" class="caixa">
            <div id="caixaNovoCurso" class="caixaFuncionalidades">
                <label for="">Nome do Curso</label>
                <input type="text" name="nomeCurso" id="nomeCurso">
                <button id="btnAdicionarCurso">Adicionar</button>
            </div>
            <div id="caixaRemoverCurso" class="caixaFuncionalidades">
                <button id="btnRemoverCurso"> Remover Selecionados</button>
            </div>
            <div class="caixaFuncionalidades" id="caixaCursoSelecionado">
                <button id="btnCursoSelecionado">Curso Selecionado</button>
            </div>
        </div>
        <div id="caixaCurso" class="caixa">
            <!-- Cursos serão adicionados aqui -->
        </div>
    </main>
    <script src="filter.js"></script>
</body>
</html>
